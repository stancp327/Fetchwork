appId: com.fetchwork.app
---
# Preconditions:
# - User is already logged in
# - At least one team exists and is visible in Profile > Teams
# - Owner/admin account for full controls visibility

- launchApp

# Navigate to teams
- tapOn: "Profile"
- tapOn: "Teams"

# Teams screen sanity
- assertVisible: "Create Team"
- assertVisible: "Organizations"
- assertVisible: "My Teams"

# Open first team (requires at least one)
- tapOn:
    text: "Open"
    index: 0

# Team detail sanity
- assertVisible: "Members"

# Phase 3 sections (owner/admin)
- assertVisible: "Custom Roles"
- assertVisible: "Linked Clients"
- assertVisible: "Team Controls"

# Basic linked-client lookup UX
- tapOn:
    id: "teamdetail-client-search-input"
- inputText: "test"

# If lookup results exist, selected-id input should be visible
- assertVisible:
    id: "teamdetail-client-userid-input"

# Numeric controls fields visible
- assertVisible:
    id: "teamdetail-cap-amount-input"
- assertVisible:
    id: "teamdetail-alert-threshold-input"
- assertVisible:
    id: "teamdetail-payout-threshold-input"
