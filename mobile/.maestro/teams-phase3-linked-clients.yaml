appId: com.fetchwork.app
---
# Scenario: Linked client lifecycle (Phase 3b)
# Preconditions:
# - Logged in as owner/admin
# - At least one team visible
# - Search term below should return at least one non-member user

- launchApp
- tapOn: "Profile"
- tapOn: "Teams"
- tapOn:
    text: "Open"
    index: 0

- assertVisible: "Linked Clients"

# Lookup + select
- tapOn:
    id: "teamdetail-client-search-input"
- eraseText
- inputText: "test"

# Selected-id input should always be available
- assertVisible:
    id: "teamdetail-client-userid-input"

# Set access + label and link
- tapOn: "Collaborate"
- tapOn: "Project Label (optional)"
- eraseText
- inputText: "Maestro Client"
- tapOn:
    id: "teamdetail-link-client-btn"

# Update linked client access and label (if row present)
- runFlow:
    when:
      visible: "Edit Label"
    commands:
      - tapOn: "All"
      - tapOn: "Edit Label"
      - tapOn: "Edit project label"
      - eraseText
      - inputText: "Maestro Client Updated"
      - tapOn: "Save Label"

# Cleanup (optional)
- runFlow:
    when:
      visible: "Unlink"
    commands:
      - tapOn: "Unlink"
